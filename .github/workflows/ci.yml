name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-01
          components: rustfmt
      - run: cargo fmt --all --check

  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-01
      - uses: Swatinem/rust-cache@v2
      - run: cargo run --bin schema_validator --release -- engine/assets/schemas

  build-c-plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-01
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "c-plugins"
      - run: sudo apt-get update && sudo apt-get install -y build-essential libjansson-dev && sudo apt-get clean
      - name: Build C plugins
        run: cargo run -p xtask -- build-c-plugins
      - uses: actions/upload-artifact@v4
        with:
          name: c-plugins
          path: plugins/
          retention-days: 1

  build-wasm-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-01
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wasm-tests"
      - run: rustup target add wasm32-unknown-unknown
      - name: Build WASM test modules
        run: cargo run -p xtask -- build-wasm-tests
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-tests
          path: engine_wasm/wasm_tests/
          retention-days: 1

  clippy:
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-01
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "clippy"
      - run: sudo apt-get update && sudo apt-get install -y libluajit-5.1-dev pkg-config && sudo apt-get clean
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test-rust:
    runs-on: ubuntu-latest
    needs: [validate-schema, build-c-plugins, build-wasm-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-01
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test-rust"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libjansson-dev libluajit-5.1-dev pkg-config mold
          sudo apt-get clean
      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - name: Download C plugins
        uses: actions/download-artifact@v4
        with:
          name: c-plugins
          path: plugins
      - name: Download WASM test artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-tests
          path: engine_wasm/wasm_tests
      - name: Build and deploy plugins
        run: cargo run -p xtask -- build-plugins
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h
      - name: Run all tests
        run: |
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$(pwd)/plugins
          cargo test --workspace

  test-lua:
    runs-on: ubuntu-latest
    needs: [build-c-plugins]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-01
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test-lua"
      - run: sudo apt-get update && sudo apt-get install -y libluajit-5.1-dev pkg-config && sudo apt-get clean
      - name: Download C plugins
        uses: actions/download-artifact@v4
        with:
          name: c-plugins
          path: plugins
      - name: Build and deploy plugins
        run: cargo run -p xtask -- build-plugins
      - name: Run Lua tests
        run: |
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$(pwd)/plugins
          cargo run --bin mge_lua_test_runner -- engine/scripts/lua/tests

  test-python:
    runs-on: ubuntu-latest
    needs: [build-c-plugins]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-01
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test-python"
      - run: sudo apt-get update && sudo apt-get install -y libluajit-5.1-dev pkg-config python3-dev python3-venv && sudo apt-get clean
      - name: Download C plugins
        uses: actions/download-artifact@v4
        with:
          name: c-plugins
          path: plugins
      - name: Build and deploy plugins
        run: cargo run -p xtask -- build-plugins
      - name: Install Python test deps
        run: |
          cd engine_py
          python3 -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest
          maturin develop --release
      - name: Run Python tests
        run: |
          cd engine_py
          source .venv/bin/activate
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$(pwd)/../plugins
          pytest tests/ -v
